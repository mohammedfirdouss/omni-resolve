version: "3.9"

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://omni:omni@postgres:5432/omni
  RABBITMQ_URL: amqp://omni:omni@rabbitmq:5672/
  QDRANT_URL: http://qdrant:6333
  AI_GATEWAY_URL: http://ai-gateway:8100

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: omni
      POSTGRES_DB: omni
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.12-management
    environment:
      RABBITMQ_DEFAULT_USER: omni
      RABBITMQ_DEFAULT_PASS: omni
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.7
    ports: ["6333:6333"]
    volumes:
      - qdrantdata:/qdrant/storage

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment: *common-env
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  ai-gateway:
    build:
      context: .
      dockerfile: services/ai-gateway/Dockerfile
    environment:
      LITELLM_MODEL: ${LITELLM_MODEL:-gpt-4o-mini}
      LITELLM_PROVIDER: ${LITELLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
    ports: ["8100:8100"]

  triage-agent:
    build:
      context: .
      dockerfile: services/triage-agent/Dockerfile
    environment: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  knowledge-agent:
    build:
      context: .
      dockerfile: services/knowledge-agent/Dockerfile
    environment: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  execution-agent:
    build:
      context: .
      dockerfile: services/execution-agent/Dockerfile
    environment: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  escalation-agent:
    build:
      context: .
      dockerfile: services/escalation-agent/Dockerfile
    environment: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  prometheus:
    image: prom/prometheus:v2.53.0
    ports: ["9090:9090"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d

  grafana:
    image: grafana/grafana:11.1.0
    ports: ["3000:3000"]
    volumes:
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  pgdata:
  qdrantdata:
