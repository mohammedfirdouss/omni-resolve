# Dev overlay: single replicas, small resources, latest images.
image:
  tag: latest

serviceDefaults:
  replicaCount: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 250m, memory: 256Mi }

postgresql:
  primary:
    persistence:
      size: 1Gi

rabbitmq:
  persistence:
    size: 1Gi

qdrant:
  persistence:
    size: 1Gi
