{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omniresolve.secretName" . }}
  labels:
    {{- include "omniresolve.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "omniresolve.databaseUrl" . | quote }}
  RABBITMQ_URL: {{ include "omniresolve.rabbitmqUrl" . | quote }}
  {{- with .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- range $key, $value := .Values.secrets.extra }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
