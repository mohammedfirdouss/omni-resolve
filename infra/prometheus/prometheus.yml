# Retention (>= 30 days, Requirement 9.7) is set via the server flag
# --storage.tsdb.retention.time=30d (see docker-compose.yml / Helm values).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs: [{ targets: ["api-gateway:8000"] }]
  - job_name: ai-gateway
    static_configs: [{ targets: ["ai-gateway:8100"] }]
  - job_name: triage-agent
    static_configs: [{ targets: ["triage-agent:8001"] }]
  - job_name: knowledge-agent
    static_configs: [{ targets: ["knowledge-agent:8002"] }]
  - job_name: execution-agent
    static_configs: [{ targets: ["execution-agent:8003"] }]
  - job_name: escalation-agent
    static_configs: [{ targets: ["escalation-agent:8004"] }]
  - job_name: rabbitmq
    static_configs: [{ targets: ["rabbitmq:15692"] }]
